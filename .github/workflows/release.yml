name: Release CLI

# Auto-release the CLI on merge to main (Release Please style):
# conventional-commit merges accumulate into a release PR; merging that PR
# tags the version, cuts a GitHub Release, publishes to npm, and attaches
# standalone binaries for every platform.
on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      released: ${{ steps.rp.outputs['packages/cli--release_created'] }}
      tag: ${{ steps.rp.outputs['packages/cli--tag_name'] }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: rp
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          # A PAT (not GITHUB_TOKEN) so the release PR is authored by a real
          # user and therefore TRIGGERS CI — which is what auto-merge waits on.
          # Falls back to GITHUB_TOKEN (PR opens, but CI won't run on it).
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}

      # Turn on auto-merge for the release PR so it merges itself once the
      # required CI checks (incl. integration tests) go green. Requires the repo
      # setting "Allow auto-merge" + branch protection requiring those checks.
      - name: Enable auto-merge on the release PR
        if: ${{ steps.rp.outputs['packages/cli--release_created'] != 'true' }}
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          pr=$(gh pr list --state open --label "autorelease: pending" --json number --jq '.[0].number')
          if [ -n "$pr" ]; then
            gh pr merge "$pr" --auto --squash && echo "auto-merge enabled on PR #$pr"
          else
            echo "no pending release PR"
          fi

  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.released == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/cli
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Build standalone binaries
        run: npm run binaries

      - name: Name binaries after the CLI
        working-directory: packages/cli/binaries
        run: for f in index-*; do mv "$f" "telemetry-${f#index-}"; done

      - name: Attach binaries to the GitHub Release
        run: gh release upload "${{ needs.release-please.outputs.tag }}" binaries/telemetry-* --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
